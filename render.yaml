services:
  - type: web
    name: vetrismartcv
    runtime: java
    rootDir: "vetrismartcv-updated/vetrismartcv-AI_Resume_updated/vetrismartcv-AI Resume/output"
    plan: free
    buildCommand: mvn clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/vetrismartcv-0.0.1-SNAPSHOT.jar
    healthCheckPath: /
    envVars:
      - key: JAVA_VERSION
        value: "17"
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_THYMELEAF_CACHE
        value: "true"
      - key: SERVER_SERVLET_SESSION_COOKIE_SECURE
        value: "true"
      - key: OAUTH_GOOGLE_CLIENT_ID
        sync: false
      - key: OAUTH_LINKEDIN_CLIENT_ID
        sync: false
      - key: OAUTH_LINKEDIN_CLIENT_SECRET
        sync: false
      - key: OAUTH_LINKEDIN_REDIRECT_URI
        sync: false
