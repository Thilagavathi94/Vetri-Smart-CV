# =============================================
# VetriSmartCV - Application Configuration
# Render-ready defaults with environment override support
# =============================================

server.port=${PORT:8080}
server.forward-headers-strategy=framework

# ---- Database ----
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/vetrismartcv?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}

# ---- Thymeleaf ----
spring.thymeleaf.cache=${SPRING_THYMELEAF_CACHE:false}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ---- File Upload ----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}

# ---- Session / Cookies ----
server.servlet.session.timeout=${SERVER_SERVLET_SESSION_TIMEOUT:2h}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=${SERVER_SERVLET_SESSION_COOKIE_SAME_SITE:Lax}
server.servlet.session.cookie.secure=${SERVER_SERVLET_SESSION_COOKIE_SECURE:false}

# ---- Logging ----
logging.level.com.vetrismartcv=${LOGGING_LEVEL_COM_VETRISMARTCV:DEBUG}

# =============================================
# OAuth Configuration
# =============================================

# ---- Google OAuth (Google Identity Services) ----
oauth.google.client-id=${OAUTH_GOOGLE_CLIENT_ID:}

# ---- LinkedIn OAuth 2.0 ----
oauth.linkedin.client-id=${OAUTH_LINKEDIN_CLIENT_ID:}
oauth.linkedin.client-secret=${OAUTH_LINKEDIN_CLIENT_SECRET:}
oauth.linkedin.redirect-uri=${OAUTH_LINKEDIN_REDIRECT_URI:http://localhost:8080/oauth/linkedin/callback}
